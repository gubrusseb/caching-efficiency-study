<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${pageTitle}">Мой сайт</title>

    <!-- Bootstrap CSS (темная тема) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <!-- Font Awesome для иконок -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts - Inter для современного шрифта -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            font-family: 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        .navbar {
            background: rgba(255, 255, 255, 0.95) !important;
            backdrop-filter: blur(10px);
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.1);
        }

        .navbar-brand {
            font-weight: 600;
            color: #2d3748 !important;
        }

        .nav-link {
            color: #4a5568 !important;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .nav-link:hover {
            color: #667eea !important;
        }

        .nav-link.active {
            color: #667eea !important;
        }

        main {
            min-height: calc(100vh - 140px);
            display: flex;
            align-items: center;
        }

        .footer {
            background: transparent;
            color: rgba(255, 255, 255, 0.8);
        }
    </style>
</head>
<body>
<!-- Шапка -->
<header th:fragment="header">
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" th:href="@{/}">
                <i class="fas fa-cube me-2"></i>
                MyApp
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/}">
                            <i class="fas fa-home me-1"></i>Главная
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/about}">
                            <i class="fas fa-info-circle me-1"></i>О нас
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/contacts}">
                            <i class="fas fa-envelope me-1"></i>Контакты
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" th:href="@{/login}">
                            <i class="fas fa-sign-in-alt me-1"></i>Вход
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
</header>

<!-- Базовый шаблон -->
<div th:fragment="base(pageTitle, content)">
    <div th:replace="~{fragments/layout :: header}"></div>

    <main>
        <div th:replace="${content}"></div>
    </main>

    <!-- Подвал -->
    <footer th:fragment="footer" class="footer text-center py-3">
        <div class="container">
            <p class="mb-0">
                <i class="far fa-copyright me-1"></i> 2024 MyApp. Все права защищены.
            </p>
        </div>
    </footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
